<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Horário | Clínica PSI</title>

    <link rel="stylesheet" href="css/main.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>
          <i class="bi bi-heart-pulse-fill"></i>

          Clínica PSI
        </h2>
      </div>

      <nav class="sidebar-menu">
        <a href="inicio.html">
          <i class="bi bi-grid-fill"></i>

          Dashboard
        </a>

        <a href="pacientes.html">
          <i class="bi bi-people-fill"></i>

          Pacientes
        </a>

        <a href="psicologos.html">
          <i class="bi bi-person-badge-fill"></i>

          Psicólogos
        </a>

        <a href="servicos.html">
          <i class="bi bi-clipboard2-pulse-fill"></i>

          Serviços
        </a>

        <a class="active" href="horarios.html">
          <i class="bi bi-clock-fill"></i>

          Horários
        </a>

        <a href="consultas.html">
          <i class="bi bi-calendar-check-fill"></i>

          Consultas
        </a>
      </nav>

      <div class="sidebar-footer">
        <strong id="usuarioNome"></strong>
      </div>
    </aside>

    <div class="content">
      <header class="navbar">
        <h2 id="tituloPagina">Novo Horário</h2>

        <button class="btn btn-outline" onclick="Auth.logout()">
          <i class="bi bi-box-arrow-right"></i>

          Sair
        </button>
      </header>

      <main class="main">
        <div class="card">
          <form id="formHorario">
            <div class="form-group">
              <label>Psicólogo</label>

              <select id="psicologo" class="form-control" required></select>
            </div>

            <div class="grid grid-2">
              <div class="form-group">
                <label>Data</label>

                <input id="data" class="form-control" type="date" required />
              </div>

              <div class="form-group">
                <label>Hora</label>

                <input id="hora" class="form-control" type="time" required />
              </div>
            </div>

            <div id="divDisponivel" class="form-group" style="display: none">
              <label>
                <input id="disponivel" type="checkbox" />

                Disponível
              </label>
            </div>

            <div class="mt-2 d-flex gap-1">
              <button class="btn btn-primary" type="submit">
                <i class="bi bi-check-circle-fill"></i>

                Salvar
              </button>

              <a href="horarios.html" class="btn btn-danger"> Cancelar </a>
            </div>
          </form>
        </div>
      </main>
    </div>

    <script src="js/utils.js"></script>

    <script src="js/main.js"></script>

    <script src="js/services/api.js"></script>

    <script src="js/services/auth.js"></script>

    <script src="js/services/psicologoService.js"></script>

    <script src="js/services/horarioService.js"></script>

    <script src="js/pages/horario-form.js"></script>
  </body>
</html>
