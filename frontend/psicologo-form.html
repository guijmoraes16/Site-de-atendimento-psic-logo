<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Psicólogo | Clínica PSI</title>

    <link rel="stylesheet" href="css/main.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <!-- =====================================
            SIDEBAR
    ====================================== -->

    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>
          <i class="bi bi-heart-pulse-fill"></i>

          Clínica PSI
        </h2>
      </div>

      <nav class="sidebar-menu">
        <a href="index.html">
          <i class="bi bi-grid-1x2-fill"></i>

          Dashboard
        </a>

        <a href="pacientes.html">
          <i class="bi bi-people-fill"></i>

          Pacientes
        </a>

        <a class="active" href="psicologos.html">
          <i class="bi bi-person-badge-fill"></i>

          Psicólogos
        </a>

        <a href="servicos.html">
          <i class="bi bi-clipboard2-pulse-fill"></i>

          Serviços
        </a>

        <a href="horarios.html">
          <i class="bi bi-clock-fill"></i>

          Horários
        </a>

        <a href="consultas.html">
          <i class="bi bi-calendar-check-fill"></i>

          Consultas
        </a>
      </nav>

      <div class="sidebar-footer">
        <strong id="usuarioNome"></strong>
      </div>
    </aside>

    <!-- =====================================
            CONTEÚDO
    ====================================== -->

    <div class="content">
      <header class="navbar">
        <h2 id="tituloPagina">Novo Psicólogo</h2>

        <button class="btn btn-outline" onclick="Auth.logout()">
          <i class="bi bi-box-arrow-right"></i>

          Sair
        </button>
      </header>

      <main class="main">
        <div class="card">
          <form id="formPsicologo">
            <div class="form-group">
              <label>Nome</label>

              <input id="nome" class="form-control" type="text" required />
            </div>

            <div class="form-group">
              <label>Título</label>

              <input
                id="titulo"
                class="form-control"
                type="text"
                placeholder="Ex.: Psicóloga Clínica"
                required
              />
            </div>

            <div class="form-group">
              <label>Foto</label>

              <input
                id="foto"
                class="form-control"
                type="text"
                placeholder="foto.jpg"
              />
            </div>

            <div class="form-group">
              <label>Biografia</label>

              <textarea
                id="bio"
                class="form-control"
                rows="5"
                placeholder="Descreva o profissional..."
              ></textarea>
            </div>

            <div class="form-group">
              <label>
                <input id="ativo" type="checkbox" checked />

                Psicólogo ativo
              </label>
            </div>

            <div class="d-flex gap-1 mt-2">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-circle-fill"></i>

                Salvar
              </button>

              <a href="psicologos.html" class="btn btn-danger"> Cancelar </a>
            </div>
          </form>
        </div>
      </main>
    </div>

    <script src="js/utils.js"></script>

    <script src="js/main.js"></script>

    <script src="js/services/api.js"></script>

    <script src="js/services/auth.js"></script>

    <script src="js/services/psicologoService.js"></script>

    <script src="js/pages/psicologo-form.js"></script>
  </body>
</html>
