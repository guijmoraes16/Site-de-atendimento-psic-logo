<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Serviço | Clínica PSI</title>

    <link rel="stylesheet" href="css/main.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>
          <i class="bi bi-heart-pulse-fill"></i>

          Clínica PSI
        </h2>
      </div>

      <nav class="sidebar-menu">
        <a href="inicio.html">
          <i class="bi bi-grid-1x2-fill"></i>

          Dashboard
        </a>

        <a href="pacientes.html">
          <i class="bi bi-people-fill"></i>

          Pacientes
        </a>

        <a href="psicologos.html">
          <i class="bi bi-person-badge-fill"></i>

          Psicólogos
        </a>

        <a class="active" href="servicos.html">
          <i class="bi bi-clipboard2-pulse-fill"></i>

          Serviços
        </a>

        <a href="horarios.html">
          <i class="bi bi-clock-fill"></i>

          Horários
        </a>

        <a href="consultas.html">
          <i class="bi bi-calendar-check-fill"></i>

          Consultas
        </a>
      </nav>

      <div class="sidebar-footer">
        <strong id="usuarioNome"></strong>
      </div>
    </aside>

    <div class="content">
      <header class="navbar">
        <h2 id="tituloPagina">Novo Serviço</h2>

        <button class="btn btn-outline" onclick="Auth.logout()">
          <i class="bi bi-box-arrow-right"></i>

          Sair
        </button>
      </header>

      <main class="main">
        <div class="card">
          <form id="formServico">
            <div class="form-group">
              <label>Nome</label>

              <input id="nome" class="form-control" type="text" required />
            </div>

            <div class="form-group">
              <label>Descrição</label>

              <textarea id="descricao" class="form-control" rows="4"></textarea>
            </div>

            <div class="grid grid-3">
              <div class="form-group">
                <label>Valor (R$)</label>

                <input
                  id="valor"
                  class="form-control"
                  type="number"
                  min="0"
                  step="0.01"
                  required
                />
              </div>

              <div class="form-group">
                <label>Duração (minutos)</label>

                <input
                  id="duracao"
                  class="form-control"
                  type="number"
                  min="1"
                  required
                />
              </div>

              <div class="form-group">
                <label>Modalidade</label>

                <input
                  id="modalidade"
                  class="form-control"
                  placeholder="Online, Presencial..."
                  type="text"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label>
                <input id="ativo" type="checkbox" checked />

                Serviço ativo
              </label>
            </div>

            <div class="d-flex gap-1 mt-2">
              <button class="btn btn-primary" type="submit">
                <i class="bi bi-check-circle-fill"></i>

                Salvar
              </button>

              <a class="btn btn-danger" href="servicos.html"> Cancelar </a>
            </div>
          </form>
        </div>
      </main>
    </div>

    <script src="js/utils.js"></script>

    <script src="js/main.js"></script>
    <script src="js/services/api.js"></script>
    <script src="js/services/auth.js"></script>
    <script src="js/services/servicoService.js"></script>

    <script src="js/pages/servico-form.js"></script>
  </body>
</html>
