<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Consulta | Clínica PSI</title>

    <link rel="stylesheet" href="css/main.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>
          <i class="bi bi-heart-pulse-fill"></i>

          Clínica PSI
        </h2>
      </div>

      <nav class="sidebar-menu">
        <a href="index.html"> Dashboard </a>

        <a href="pacientes.html"> Pacientes </a>

        <a href="psicologos.html"> Psicólogos </a>

        <a href="servicos.html"> Serviços </a>

        <a href="horarios.html"> Horários </a>

        <a class="active" href="consultas.html"> Consultas </a>
      </nav>

      <div class="sidebar-footer">
        <strong id="usuarioNome"></strong>
      </div>
    </aside>

    <div class="content">
      <header class="navbar">
        <h2 id="tituloPagina">Nova Consulta</h2>

        <button class="btn btn-outline" onclick="Auth.logout()">Sair</button>
      </header>

      <main class="main">
        <div class="card">
          <form id="formConsulta">
            <div class="form-group">
              <label> Paciente </label>

              <select id="paciente" class="form-control"></select>
            </div>

            <div class="form-group">
              <label> Psicólogo </label>

              <select id="psicologo" class="form-control"></select>
            </div>

            <div class="form-group">
              <label> Serviço </label>

              <select id="servico" class="form-control"></select>
            </div>

            <div class="form-group">
              <label> Horário </label>

              <select id="horario" class="form-control"></select>
            </div>

            <div class="form-group">
              <label> Mensagem </label>

              <textarea id="mensagem" class="form-control" rows="4"></textarea>
            </div>

            <div id="divStatus" class="form-group" style="display: none">
              <label> Status </label>

              <select id="status" class="form-control">
                <option>Agendado</option>

                <option>Confirmado</option>

                <option>Concluido</option>

                <option>Cancelado</option>
              </select>
            </div>

            <div class="mt-2 d-flex gap-1">
              <button class="btn btn-primary" type="submit">Salvar</button>

              <a href="consultas.html" class="btn btn-danger"> Cancelar </a>
            </div>
          </form>
        </div>
      </main>
    </div>

    <script src="js/utils.js"></script>

    <script src="js/main.js"></script>

    <script src="js/services/api.js"></script>

    <script src="js/services/auth.js"></script>

    <script src="js/services/pacienteService.js"></script>

    <script src="js/services/psicologoService.js"></script>

    <script src="js/services/servicoService.js"></script>

    <script src="js/services/horarioService.js"></script>

    <script src="js/services/consultaService.js"></script>

    <script src="js/pages/consulta-form.js"></script>
  </body>
</html>
