<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/agenda.css" />
  </head>
  <body>
    
    <section id="agendamento" class="formulario">
      <h2>Agende sua Consulta</h2>

      <form id="formAgenda">
        <input type="text" placeholder="Nome Completo" required />

        <input type="email" placeholder="E-mail" required />

        <input type="tel" placeholder="Telefone" />

        <select required>
          <option>Escolha uma especialidade</option>

          <option>Ansiedade</option>

          <option>Depressão</option>

          <option>Terapia Individual</option>

          <option>Terapia Infantil</option>

          <option>Terapia de Casal</option>
        </select>

        <input type="date" required />

        <input type="time" required />

        <button type="submit">Confirmar Agendamento</button>
      </form>
    </section>

    <script>
      const token = localStorage.getItem("token");

      if (!token) {
        alert("Você precisa fazer login.");
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
