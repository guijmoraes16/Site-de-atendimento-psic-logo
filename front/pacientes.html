<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Pacientes | Clínica PSI</title>

    <link rel="stylesheet" href="css/main.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2><i class="bi bi-heart-pulse-fill"></i> Clínica PSI</h2>
      </div>

      <nav class="sidebar-menu">
        <a href="index.html">
          <i class="bi bi-grid-fill"></i>
          Dashboard
        </a>

        <a class="active" href="pacientes.html">
          <i class="bi bi-people-fill"></i>
          Pacientes
        </a>

        <a href="psicologos.html">
          <i class="bi bi-person-badge-fill"></i>
          Psicólogos
        </a>

        <a href="servicos.html">
          <i class="bi bi-clipboard2-pulse-fill"></i>
          Serviços
        </a>

        <a href="horarios.html">
          <i class="bi bi-clock-fill"></i>
          Horários
        </a>

        <a href="consultas.html">
          <i class="bi bi-calendar-check-fill"></i>
          Agendamentos
        </a>
      </nav>

      <div class="sidebar-footer">
        <strong id="usuarioNome"></strong>
      </div>
    </aside>

    <div class="content">
      <header class="navbar">
        <h2></h2>

        <button class="btn btn-outline" onclick="Auth.logout()">
          <i class="bi bi-box-arrow-right"></i>

          Sair
        </button>
      </header>

      <main class="main">
        <div class="page-header d-flex justify-between align-center">
          <div>
            <h1>Pacientes</h1>

            <p>Gerencie os pacientes cadastrados.</p>
          </div>

          <a href="paciente-form.html" class="btn btn-primary">
            <i class="bi bi-person-plus-fill"></i>

            Novo Paciente
          </a>
        </div>

        <div class="card">
          <div class="d-flex gap-1 mb-2">
            <input
              id="pesquisa"
              class="form-control"
              type="text"
              placeholder="Pesquisar por nome..."
            />

            <button class="btn btn-primary" id="btnPesquisar">
              <i class="bi bi-search"></i>

              Pesquisar
            </button>
          </div>

          <div class="table-responsive">
            <table class="table" id="tabelaPacientes">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>CPF</th>
                  <th>Telefone</th>
                  <th>E-mail</th>
                  <th width="180">Ações</th>
                </tr>
              </thead>

              <tbody></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>

    <script src="js/services/api.js"></script>
    <script src="js/services/auth.js"></script>
    <script src="js/services/pacienteService.js"></script>

    <script src="js/pages/pacientes.js"></script>
  </body>
</html>
